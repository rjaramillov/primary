<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --bg: #FFF8F0;
    --fg: #2D3436;
    --muted: #7F8C8D;
    --accent: #FF6B35;
    --accent2: #00B4A6;
    --accent3: #E84393;
    --card: #FFFFFF;
    --border: #EDE6DD;
    --success: #00C853;
    --error: #FF3D00;
    --l1: #FF6B35;
    --l2: #00B4A6;
    --l3: #E84393;
    --star: #FFD166;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;position:relative}
.bg-shapes{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-shape{position:absolute;border-radius:50%;opacity:0.07;animation:bfloat 18s ease-in-out infinite}
.bg-shape:nth-child(1){width:300px;height:300px;background:var(--l1);top:-80px;left:-60px}
.bg-shape:nth-child(2){width:250px;height:250px;background:var(--l2);bottom:-50px;right:-40px;animation-delay:-6s}
.bg-shape:nth-child(3){width:200px;height:200px;background:var(--l3);top:40%;left:60%;animation-delay:-12s}
@keyframes bfloat{0%,100%{transform:translateY(0) scale(1)}33%{transform:translateY(-25px) scale(1.05)}66%{transform:translateY(15px) scale(0.95)}}
#app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:16px;min-height:100vh}
#confetti-canvas{position:fixed;inset:0;z-index:1000;pointer-events:none;display:none}
h1{font-size:2rem;font-weight:900;line-height:1.15}
h2{font-size:1.5rem;font-weight:800;line-height:1.2}
h3{font-size:1.15rem;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:14px;border:none;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;position:relative;overflow:hidden}
.btn:active{transform:scale(0.96)}
.btn-back{background:var(--card);color:var(--fg);border:2px solid var(--border);padding:8px 16px;font-size:.9rem;border-radius:12px}
.btn-back:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 4px 16px rgba(255,107,53,.3)}
.btn-teal{background:var(--accent2);color:#fff}
.btn-teal:hover{filter:brightness(1.1);box-shadow:0 4px 16px rgba(0,180,166,.3)}
.btn-pink{background:var(--accent3);color:#fff}
.btn-pink:hover{filter:brightness(1.1);box-shadow:0 4px 16px rgba(232,67,147,.3)}
.card{background:var(--card);border-radius:20px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:2px solid var(--border);transition:all .25s}
.card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1)}
.card-l1:hover{border-color:var(--l1)}
.card-l2:hover{border-color:var(--l2)}
.card-l3:hover{border-color:var(--l3)}
.stars{display:flex;gap:4px}
.star{color:#DDD;font-size:1.2rem;transition:color .3s,transform .3s}
.star.earned{color:var(--star);transform:scale(1.1)}
.star.big{font-size:2.5rem}
.menu-header{text-align:center;padding:24px 0 8px}
.menu-header h1{color:var(--accent)}
.menu-header p{color:var(--muted);font-weight:600;margin-top:4px}
.total-stars{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#FFF3E0,#FFF8F0);border:2px solid var(--star);border-radius:50px;padding:8px 20px;margin:16px 0 24px;font-weight:800;font-size:1.1rem;color:#E67E22}
.level-card{cursor:pointer;margin-bottom:16px;display:flex;align-items:center;gap:20px}
.level-icon{width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff;flex-shrink:0}
.level-info{flex:1}
.level-info h2{margin-bottom:2px}
.level-info p{color:var(--muted);font-size:.9rem}
.level-stars{display:flex;align-items:center;gap:6px;font-weight:700;color:var(--muted);font-size:.9rem}
.level-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.level-title{flex:1}
.act-card{cursor:pointer;margin-bottom:12px;display:flex;align-items:center;gap:16px;padding:18px 20px}
.act-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;flex-shrink:0}
.act-info{flex:1}
.act-info h3{margin-bottom:2px}
.act-info p{color:var(--muted);font-size:.85rem}
.activity-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.activity-title{flex:1;min-width:150px}
.progress-bar{width:100%;height:8px;background:var(--border);border-radius:4px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .5s ease}
.hint{text-align:center;color:var(--muted);font-size:.9rem;font-weight:600;margin-bottom:16px;padding:10px;background:rgba(0,0,0,.03);border-radius:12px}
.match-container{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.match-col{display:flex;flex-direction:column;gap:10px;min-width:140px}
.match-item{padding:14px;border-radius:14px;border:3px solid var(--border);background:var(--card);cursor:pointer;text-align:center;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:8px;user-select:none}
.match-item:hover:not(.matched):not(.correct){border-color:var(--accent);transform:translateY(-2px)}
.match-item.selected{border-color:var(--accent);background:#FFF3E0;box-shadow:0 0 0 3px rgba(255,107,53,.2)}
.match-item.correct{border-color:var(--success);background:#E8F5E9;opacity:.7;cursor:default}
.match-item.wrong{border-color:var(--error);background:#FFEBEE}
.frac-pie{width:56px;height:56px;border-radius:50%;position:relative;flex-shrink:0}
.frac-pie::after{content:'';position:absolute;top:50%;left:50%;width:24px;height:24px;border-radius:50%;background:var(--card);transform:translate(-50%,-50%)}
.frac-text{font-weight:800;font-size:1.05rem}
.quiz-visual{text-align:center;margin-bottom:16px}
.quiz-question{font-size:1.15rem;font-weight:700;text-align:center;margin-bottom:20px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-opt{padding:16px 20px;border-radius:14px;border:3px solid var(--border);background:var(--card);cursor:pointer;font-size:1.05rem;font-weight:700;text-align:center;transition:all .2s;font-family:inherit}
.quiz-opt:hover:not(.disabled){border-color:var(--accent);transform:translateY(-2px)}
.quiz-opt.correct-opt{border-color:var(--success);background:#E8F5E9;color:var(--success)}
.quiz-opt.wrong-opt{border-color:var(--error);background:#FFEBEE;color:var(--error);animation:shake .4s}
.quiz-opt.disabled{pointer-events:none;opacity:.6}
.quiz-opt.show-correct{border-color:var(--success);background:#E8F5E9}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:400px;margin:0 auto}
.memory-card{aspect-ratio:1;perspective:600px;cursor:pointer}
.memory-card-inner{width:100%;height:100%;position:relative;transition:transform .5s;transform-style:preserve-3d}
.memory-card.flipped .memory-card-inner{transform:rotateY(180deg)}
.memory-card.matched .memory-card-inner{transform:rotateY(180deg)}
.memory-face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;padding:6px;text-align:center}
.memory-front{background:linear-gradient(135deg,var(--accent2),#00D2B4);color:#fff;font-size:1.5rem}
.memory-back{transform:rotateY(180deg);background:var(--card);border:3px solid var(--border)}
.memory-card.matched .memory-back{border-color:var(--success);background:#E8F5E9}
.classify-word{text-align:center;margin-bottom:20px}
.classify-word-text{font-size:2rem;font-weight:900;letter-spacing:2px;padding:16px 24px;background:var(--card);border-radius:18px;display:inline-block;border:3px solid var(--border)}
.syllable-stressed{color:var(--accent);text-decoration:underline;text-underline-offset:6px}
.classify-bins{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.classify-bin{flex:1;min-width:100px;padding:18px 12px;border-radius:16px;border:3px dashed var(--border);text-align:center;cursor:pointer;transition:all .25s;font-weight:800;font-size:.95rem}
.classify-bin:hover{transform:translateY(-3px)}
.classify-bin.bin-aguda:hover{border-color:var(--l1);background:#FFF3E0}
.classify-bin.bin-llana:hover{border-color:var(--l2);background:#E0F7F5}
.classify-bin.bin-esdrujula:hover{border-color:var(--l3);background:#FDE8F0}
.classify-bin.bin-correct{border-style:solid;transform:scale(1.05)}
.classify-bin.bin-aguda.bin-correct{border-color:var(--l1);background:#FFF3E0}
.classify-bin.bin-llana.bin-correct{border-color:var(--l2);background:#E0F7F5}
.classify-bin.bin-esdrujula.bin-correct{border-color:var(--l3);background:#FDE8F0}
.classify-bin.bin-wrong{animation:shake .4s;border-color:var(--error);background:#FFEBEE}
.chain-slots{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.chain-slot{min-width:80px;min-height:50px;border-radius:12px;border:3px dashed var(--border);display:flex;align-items:center;justify-content:center;padding:8px 12px;font-weight:700;font-size:.85rem;text-align:center;transition:all .3s}

.chain-slot.correct-slot{border-color:var(--success);background:#E8F5E9}
.chain-slot.wrong-slot{border-color:var(--error);background:#FFEBEE;animation:shake .4s}
.chain-arrow{color:var(--muted);font-size:1.2rem}
.chain-cards{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.chain-card{padding:12px 18px;border-radius:12px;border:3px solid var(--border);background:var(--card);cursor:pointer;font-weight:700;font-size:.95rem;transition:all .2s;user-select:none}
.chain-card:hover{border-color:var(--accent2);transform:translateY(-3px)}

.planets-row{display:flex;align-items:flex-end;justify-content:center;gap:6px;padding:20px 0;overflow-x:auto}
.planet{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .2s;gap:4px}
.planet:hover{transform:scale(1.15)}
.planet-sphere{border-radius:50%;transition:box-shadow .3s}

.planet-info{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:16px 20px;margin-top:12px;min-height:80px;transition:all .3s}

.complete-container{text-align:center;padding:40px 0}
.complete-icon{font-size:4rem;margin-bottom:16px;animation:bounce 1s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.complete-stars{display:flex;justify-content:center;gap:12px;margin:20px 0}
.visual-bar{height:30px;background:var(--border);border-radius:15px;overflow:hidden;margin:12px 0;position:relative}

.number-line{position:relative;height:40px;margin:20px 0;background:var(--border);border-radius:20px}
.number-line-mark{position:absolute;top:-22px;transform:translateX(-50%);font-size:.75rem;font-weight:700;color:var(--muted)}
.number-line-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.2)}

/* ===== LECTURA DE COMPRENSIรN ===== */
.reading-container{animation:slideUp .5s ease}
.reading-book{background:linear-gradient(135deg,#FFFBF0,#FFF5E6);border:3px solid var(--border);border-radius:20px;padding:0;overflow:hidden;position:relative}
.reading-book-header{background:linear-gradient(135deg,var(--accent2),#00D2B4);padding:18px 24px;display:flex;align-items:center;gap:12px}

.reading-book-header span{color:#fff;font-weight:800;font-size:1.05rem}

.reading-book-body p:last-child{margin-bottom:0}
.reading-highlight{background:linear-gradient(180deg,transparent 60%,rgba(0,180,166,.15) 60%);padding:0 2px}
.reading-ornament{text-align:center;color:var(--accent2);font-size:1.4rem;margin:8px 0;letter-spacing:8px;opacity:.4}
.reading-btn-row{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.reading-question{font-size:1.08rem;font-weight:700;text-align:center;margin-bottom:18px;line-height:1.6;color:var(--fg)}
.reading-type-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:800;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.badge-literal{background:#E0F7F5;color:var(--accent2)}
.badge-inferencial{background:#FFF3E0;color:var(--accent)}
.badge-vocab{background:#FDE8F0;color:var(--accent3)}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop-in{animation:popIn .4s ease forwards}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slideUp .4s ease forwards}
.mini-confetti{position:fixed;pointer-events:none;z-index:999;width:8px;height:8px;border-radius:2px;animation:confettiFall 1s ease forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(100px) rotate(720deg) scale(.3)}}
@media(max-width:480px){
    h1{font-size:1.6rem}h2{font-size:1.25rem}
    .match-container{flex-direction:column;align-items:center}
    .match-col{flex-direction:row;flex-wrap:wrap;justify-content:center}
    .memory-grid{grid-template-columns:repeat(3,1fr)}
    .classify-bins{flex-direction:column;align-items:center}
    .classify-bin{min-width:200px}
    .planets-row{gap:4px}
    .reading-book-body{padding:16px;font-size:.95rem}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

                    title:'El increรญble viaje de la mariposa monarca',
                    text:`<p>Cada aรฑo, cuando el otoรฑo llega a <span class="reading-highlight">Canadรก y el norte de Estados Unidos</span>, millones de mariposas monarca comienzan un viaje extraordinario. Estas pequeรฑas criaturas, con alas de color naranja brillante y bordes negros, recorren mรกs de <span class="reading-highlight">4,000 kilรณmetros</span> para llegar a los bosques de oyamel en <span class="reading-highlight">Michoacรกn y el Estado de Mรฉxico</span>.</p>

/* ===================== ESTADO ===================== */
const state={screen:'menu',currentLevel:null,currentActivity:null,stars:{}};
function loadProgress(){try{const s=localStorage.getItem('desafio_verano_stars');if(s)state.stars=JSON.parse(s)}catch(e){}}
function saveProgress(){try{localStorage.setItem('desafio_verano_stars',JSON.stringify(state.stars))}catch(e){}}
function getStars(l,a){return state.stars[`l${l}a${a}`]||0}
function setStars(l,a,v){state.stars[`l${l}a${a}`]=v;saveProgress()}
function getTotalStars(){return Object.values(state.stars).reduce((a,b)=>a+b,0)}
function getLevelStars(lv){let s=0;for(let i=1;i<=3;i++)s+=getStars(lv,i);return s}

/* ===================== SONIDOS ===================== */
let audioCtx=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playSound(type){try{const ctx=getAC();if(ctx.state==='suspended')ctx.resume();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);const t=ctx.currentTime;if(type==='correct'){o.type='sine';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+.08);o.frequency.setValueAtTime(784,t+.16);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.01,t+.4);o.start(t);o.stop(t+.4)}else if(type==='wrong'){o.type='sawtooth';o.frequency.setValueAtTime(180,t);o.frequency.setValueAtTime(140,t+.15);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.01,t+.3);o.start(t);o.stop(t+.3)}else if(type==='complete'){o.type='sine';o.frequency.setValueAtTime(523,t);o.frequency.setValueAtTime(659,t+.1);o.frequency.setValueAtTime(784,t+.2);o.frequency.setValueAtTime(1047,t+.3);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.01,t+.6);o.start(t);o.stop(t+.6)}else if(type==='click'){o.type='sine';o.frequency.setValueAtTime(800,t);g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.01,t+.05);o.start(t);o.stop(t+.05)}}catch(e){}}

/* ===================== CONFETI ===================== */
function miniConfetti(x,y){const colors=['#FF6B35','#00B4A6','#FFD166','#E84393','#00C853'];for(let i=0;i<12;i++){const el=document.createElement('div');el.className='mini-confetti';el.style.left=(x+(Math.random()-.5)*60)+'px';el.style.top=(y+(Math.random()-.5)*30)+'px';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.transform=`rotate(${Math.random()*360}deg)`;document.body.appendChild(el);setTimeout(()=>el.remove(),1000)}}
function showConfetti(){const c=document.getElementById('confetti-canvas'),ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;c.style.display='block';const colors=['#FF6B35','#00B4A6','#FFD166','#E84393','#00C853','#4A90D9'];const particles=[];for(let i=0;i<120;i++)particles.push({x:Math.random()*c.width,y:Math.random()*c.height-c.height,w:Math.random()*10+4,h:Math.random()*6+3,color:colors[Math.floor(Math.random()*colors.length)],speed:Math.random()*3+2,angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.15,drift:(Math.random()-.5)*2});let frame=0;function animate(){ctx.clearRect(0,0,c.width,c.height);particles.forEach(p=>{p.y+=p.speed;p.angle+=p.spin;p.x+=Math.sin(p.angle)*1.5+p.drift*.3;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore()});frame++;if(frame<150)requestAnimationFrame(animate);else c.style.display='none'}animate()}

/* ===================== UTILIDADES ===================== */
function fracToDeg(n,d){return(n/d)*360}
function fracPieHTML(frac,color){const deg=fracToDeg(frac.num,frac.den);return`<div class="frac-pie" style="background:conic-gradient(${color} 0deg ${deg}deg,var(--border) ${deg}deg 360deg)"></div>`}
function starsHTML(count,big){let s='';for(let i=0;i<3;i++)s+=`<i class="fa-solid fa-star star ${big?'big':''} ${i<count?'earned':''}"></i>`;return s}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function splitSyllables(word){const m=word.match(/[^aeiouรกรฉรญรณรบ]*[aeiouรกรฉรญรณรบ]+(?:[^aeiouรกรฉรญรณรบ]*$|[^aeiouรกรฉรญรณรบ](?=[^aeiouรกรฉรญรณรบ]))?/gi);return m||[word]}
function lighten(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgb(${Math.min(255,r+80)},${Math.min(255,g+80)},${Math.min(255,b+80)})`}
function updateProgress(current,total){const f=document.getElementById('act-progress');if(f)f.style.width=((current/total)*100)+'%'}

function completeActivity(stars){
    const lv=state.currentLevel,ac=state.currentActivity;
    setStars(lv,ac,Math.max(getStars(lv,ac),stars));
    playSound('complete');
    const ts=document.getElementById('activity-stars-top');
    if(ts)ts.innerHTML=starsHTML(stars);
    const allDone=LEVELS[lv-1].activities.every((_,i)=>getStars(lv,i+1)>0);
    setTimeout(()=>{if(allDone){state.screen='levelComplete';showConfetti()}else state.screen='level';render()},1200);
}

/* ===================== RENDERIZADO ===================== */
function render(){

/* --- MATCHING --- */
function initMatching(act){
    const area=document.getElementById('activity-area'),data=act.data;
    const sr=shuffle(data.pairs);
    let selL=null,matched=0,mistakes=0;const total=data.pairs.length;
    area.innerHTML=`<div class="hint"><i class="fa-solid fa-hand-pointer"></i> Toca una fracciรณn de la izquierda y luego su equivalente de la derecha</div><div class="match-container"><div class="match-col" id="match-left">${data.pairs.map(p=>`<div class="match-item" data-pair="${p.id}" data-side="left">${fracPieHTML(p.left,data.leftColor)}<span class="frac-text">${p.left.num}/${p.left.den}</span></div>`).join('')}</div><div class="match-col" id="match-right">${sr.map(p=>`<div class="match-item" data-pair="${p.id}" data-side="right">${fracPieHTML(p.right,data.rightColor)}<span class="frac-text">${p.right.num}/${p.right.den}</span></div>`).join('')}</div></div>`;
    area.addEventListener('click',function h(e){
        const li=e.target.closest('.match-item[data-side="left"]'),ri=e.target.closest('.match-item[data-side="right"]');
        if(li&&!li.classList.contains('correct')){playSound('click');area.querySelectorAll('.match-item.selected').forEach(el=>el.classList.remove('selected'));li.classList.add('selected');selL=li}
        if(ri&&!ri.classList.contains('correct')&&selL){
            if(selL.dataset.pair===ri.dataset.pair){playSound('correct');selL.classList.remove('selected');selL.classList.add('correct');ri.classList.add('correct');matched++;updateProgress(matched,total);const r=ri.getBoundingClientRect();miniConfetti(r.left+r.width/2,r.top+r.height/2);selL=null;if(matched===total){const s=mistakes===0?3:mistakes<=2?2:1;setTimeout(()=>completeActivity(s),600)}}
            else{playSound('wrong');mistakes++;selL.classList.add('wrong');ri.classList.add('wrong');const sl=selL;setTimeout(()=>{sl.classList.remove('wrong','selected');ri.classList.remove('wrong');selL=null},500)}
        }
    });
}

function initQuiz(act){

    let cq=0,correct=0;const total=qs.length;
    function showQ(){
        const q=qs[cq];let vh='';
        if(q.visual){
            if(q.visual.type==='bar'){const p=(q.visual.value/q.visual.max)*100;vh=`<div style="max-width:350px;margin:0 auto"><div class="visual-bar"><div class="visual-bar-fill" style="width:${p}%;background:${q.visual.color}">${q.visual.label}</div></div></div>`}
            else if(q.visual.type==='bars'){vh=`<div style="max-width:350px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;height:80px">`;q.visual.values.forEach(v=>{const h=(v.v/q.visual.max)*70;vh+=`<div style="flex:1;height:${h}px;background:${v.c};border-radius:6px 6px 0 0"></div>`});vh+=`</div><div style="display:flex;gap:8px;max-width:350px;margin:4px auto 0">`;q.visual.values.forEach(v=>{vh+=`<div style="flex:1;text-align:center;font-size:.7rem;font-weight:700;color:var(--muted)">${v.v}</div>`});vh+=`</div>`}
            else if(q.visual.type==='numberline'){const vs=q.visual.values,mn=vs[0],mx=vs[vs.length-1];vh=`<div style="max-width:350px;margin:0 auto;position:relative;padding-top:28px"><div class="number-line">`;vs.forEach((v,i)=>{const p=((v-mn)/(mx-mn))*100;const cs=['var(--muted)','var(--l1)','var(--success)','var(--muted)'];vh+=`<div class="number-line-dot" style="left:${p}%;background:${cs[i]||'var(--accent)'}"></div><div class="number-line-mark" style="left:${p}%">${v}</div>`});vh+=`</div></div>`}
        }
        area.innerHTML=`<div class="pop-in">${vh?`<div class="quiz-visual">${vh}</div>`:''}<div class="quiz-question">${cq+1}. ${q.q}</div><div class="quiz-options">${q.opts.map((o,i)=>`<button class="quiz-opt" data-idx="${i}">${o}</button>`).join('')}</div></div>`;
        area.querySelectorAll('.quiz-opt').forEach(btn=>{btn.addEventListener('click',function(){const idx=parseInt(this.dataset.idx);area.querySelectorAll('.quiz-opt').forEach(b=>b.classList.add('disabled'));if(idx===q.answer){playSound('correct');this.classList.add('correct-opt');correct++;const r=this.getBoundingClientRect();miniConfetti(r.left+r.width/2,r.top)}else{playSound('wrong');this.classList.add('wrong-opt');area.querySelectorAll('.quiz-opt')[q.answer].classList.add('show-correct')}setTimeout(()=>{cq++;updateProgress(cq,total);if(cq<total)showQ();else{const s=correct===total?3:correct>=total-1?2:1;completeActivity(s)}},900)})});
    }
    showQ();
}

/* --- EXPLORE (Sistema Solar) --- */
function initExplore(act){
    const area=document.getElementById('activity-area'),data=act.data;
    let explored=new Set(),phase='explore',cq=0,correct=0;const totalQ=data.questions.length;
    function renderEx(){
        area.innerHTML=`<div class="hint"><i class="fa-solid fa-hand-pointer"></i> Toca cada planeta para conocerlo. Revisa los 8 antes del reto.</div><div class="planets-row" id="planets-row"><div class="planet" style="width:50px"><div class="planet-sphere" style="width:36px;height:36px;background:radial-gradient(circle at 35% 35%,#FFF4A0,#FFB800);box-shadow:0 0 16px rgba(255,184,0,.5)"></div><span class="planet-label">Sol</span></div>${data.planets.map((p,i)=>`<div class="planet" data-idx="${i}" style="width:${Math.max(50,p.size+20)}px"><div class="planet-sphere" style="width:${p.size}px;height:${p.size}px;background:radial-gradient(circle at 35% 35%,${lighten(p.color)},${p.color})"></div><span class="planet-label">${p.name}</span></div>`).join('')}</div><div class="planet-info" id="planet-info"><p style="text-align:center;color:var(--muted)"><i class="fa-solid fa-arrow-up"></i> Toca un planeta para ver su informaciรณn</p></div><div style="text-align:center;margin-top:16px"><span style="font-weight:700;color:var(--muted);font-size:.9rem" id="explore-count">${explored.size}/8 planetas revisados</span></div>${explored.size===8?'<div style="text-align:center;margin-top:12px"><button class="btn btn-primary" id="start-quiz-btn" style="font-size:1.1rem;padding:14px 32px"><i class="fa-solid fa-play"></i> Comenzar reto</button></div>':''}`;
        area.querySelectorAll('.planet[data-idx]').forEach(el=>{el.addEventListener('click',function(){const idx=parseInt(this.dataset.idx),p=data.planets[idx];explored.add(idx);playSound('click');area.querySelectorAll('.planet').forEach(pl=>pl.classList.remove('active'));this.classList.add('active');document.getElementById('planet-info').innerHTML=`<h3 style="color:${p.color}">${p.name}</h3><p>${p.info}</p>`;document.getElementById('explore-count').textContent=`${explored.size}/8 planetas revisados`;if(explored.size===8)renderEx()})});
        const qb=document.getElementById('start-quiz-btn');if(qb)qb.addEventListener('click',()=>{phase='quiz';showQuizQ()});
    }
    function showQuizQ(){
        const q=data.questions[cq];
        area.innerHTML=`<div class="pop-in"><div class="quiz-question">${cq+1}. ${q.q}</div><div class="quiz-options">${q.opts.map((o,i)=>`<button class="quiz-opt" data-idx="${i}">${o}</button>`).join('')}</div></div>`;
        area.querySelectorAll('.quiz-opt').forEach(btn=>{btn.addEventListener('click',function(){const idx=parseInt(this.dataset.idx);area.querySelectorAll('.quiz-opt').forEach(b=>b.classList.add('disabled'));if(idx===q.answer){playSound('correct');this.classList.add('correct-opt');correct++;const r=this.getBoundingClientRect();miniConfetti(r.left+r.width/2,r.top)}else{playSound('wrong');this.classList.add('wrong-opt');area.querySelectorAll('.quiz-opt')[q.answer].classList.add('show-correct')}setTimeout(()=>{cq++;updateProgress((cq/totalQ)*100,100);if(cq<totalQ)showQuizQ();else{const s=correct===totalQ?3:correct>=totalQ-1?2:1;completeActivity(s)}},900)})});
    }
    renderEx();updateProgress(0,100);
}

/* ===== LECTURA DE COMPRENSIรN ===== */
function initReading(act){
    const area=document.getElementById('activity-area'),data=act.data;
    let phase='read'; // read โ quiz
    let cq=0, correct=0;
    const total=data.questions.length;

    function renderReadPhase(){
        area.innerHTML=`<div class="reading-container">
            <div class="reading-book">
                <div class="reading-book-header">
                    <i class="fa-solid fa-book-open"></i>
                    <span>${data.title}</span>
                </div>
                <div class="reading-book-body">
                    ${data.text}
                </div>
            </div>
            <div class="reading-btn-row">
                <button class="btn btn-teal" id="reading-start-btn" style="font-size:1.05rem;padding:14px 28px">
                    <i class="fa-solid fa-check-double"></i> Ya leรญ todo, empezar preguntas
                </button>
            </div>
        </div>`;

        document.getElementById('reading-start-btn').addEventListener('click',()=>{
            playSound('click');
            phase='quiz';
            showReadingQ();
        });
    }

    function showReadingQ(){
        const q=data.questions[cq];
        const badgeClass = q.type==='literal'?'badge-literal':q.type==='inferencial'?'badge-inferencial':'badge-vocab';

        area.innerHTML=`<div class="pop-in">
            <div style="text-align:center">
                <span class="reading-type-badge ${badgeClass}">${q.label}</span>
            </div>
            <div class="reading-question">${cq+1}. ${q.q}</div>
            <div class="quiz-options">
                ${q.opts.map((o,i)=>`<button class="quiz-opt" data-idx="${i}">${o}</button>`).join('')}
            </div>
            <div style="text-align:center;margin-top:16px">
                <button class="btn btn-back" id="re-read-btn" style="font-size:.85rem;padding:8px 16px">
                    <i class="fa-solid fa-book-open"></i> Volver al texto
                </button>
            </div>
        </div>`;

        // Botรณn para volver a leer
        document.getElementById('re-read-btn').addEventListener('click',()=>{
            phase='read';
            renderReadPhase();
        });

        area.querySelectorAll('.quiz-opt').forEach(btn=>{
            btn.addEventListener('click',function(){
                const idx=parseInt(this.dataset.idx);
                area.querySelectorAll('.quiz-opt').forEach(b=>b.classList.add('disabled'));
                if(idx===q.answer){
                    playSound('correct');
                    this.classList.add('correct-opt');
                    correct++;
                    const r=this.getBoundingClientRect();
                    miniConfetti(r.left+r.width/2,r.top);
                } else {
                    playSound('wrong');
                    this.classList.add('wrong-opt');
                    area.querySelectorAll('.quiz-opt')[q.answer].classList.add('show-correct');
                }
                setTimeout(()=>{
                    cq++;
                    updateProgress(cq, total);
                    if(cq<total) showReadingQ();
                    else {
                        const s = correct===total ? 3 : correct>=total-1 ? 2 : 1;
                        completeActivity(s);
                    }
                }, 1000);
            });
        });
    }

    renderReadPhase();
}

/* --- MEMORY --- */
function initMemory(act){
    const area=document.getElementById('activity-area'),pairs=act.data.pairs;
    let cards=[];pairs.forEach((p,i)=>{cards.push({text:p.a,pairId:i,type:p.type});cards.push({text:p.b,pairId:i,type:p.type})});
    cards=shuffle(cards);let flipped=[],matched=0,moves=0,locked=false;const total=pairs.length;
    function renderC(){
        area.innerHTML=`<div class="hint"><i class="fa-solid fa-hand-pointer"></i> Encuentra los pares de sinรณnimos y antรณnimos. Toca dos tarjetas para voltearlas.</div><div style="text-align:center;margin-bottom:12px;font-weight:700;color:var(--muted);font-size:.9rem">Movimientos: <span id="move-count">${moves}</span> | Pares: <span id="pair-count">${matched}</span>/${total}</div><div class="memory-grid" id="memory-grid">${cards.map((c,i)=>`<div class="memory-card" data-idx="${i}"><div class="memory-card-inner"><div class="memory-face memory-front"><i class="fa-solid fa-question"></i></div><div class="memory-face memory-back"><span>${c.text}</span><span style="font-size:.6rem;color:${c.type==='sin'?'var(--success)':'var(--error)'};position:absolute;bottom:6px">${c.type==='sin'?'Sinรณnimo':'Antรณnimo'}</span></div></div></div>`).join('')}</div>`;
        area.querySelectorAll('.memory-card').forEach(el=>{el.addEventListener('click',function(){if(locked||this.classList.contains('flipped')||this.classList.contains('matched'))return;playSound('click');this.classList.add('flipped');flipped.push(this);if(flipped.length===2){moves++;document.getElementById('move-count').textContent=moves;locked=true;const[a,b]=flipped;const ca=cards[parseInt(a.dataset.idx)],cb=cards[parseInt(b.dataset.idx)];if(ca.pairId===cb.pairId&&a!==b){playSound('correct');setTimeout(()=>{a.classList.add('matched');b.classList.add('matched');matched++;document.getElementById('pair-count').textContent=matched;updateProgress(matched,total);const r=b.getBoundingClientRect();miniConfetti(r.left+r.width/2,r.top+r.height/2);flipped=[];locked=false;if(matched===total){const s=moves<=total+2?3:moves<=total+5?2:1;setTimeout(()=>completeActivity(s),600)}},500)}else{playSound('wrong');setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];locked=false},800)}}})});
    }
    renderC();
}

/* --- CLASSIFY --- */
function initClassify(act){
    const area=document.getElementById('activity-area'),data=act.data;
    let current=0,correct=0;const total=data.words.length;
    function showW(){
        const w=data.words[current],syllables=splitSyllables(w.text);
        const rendered=syllables.map((s,i)=>i===w.stressed?`<span class="syllable-stressed">${s}</span>`:s).join('-');
        area.innerHTML=`<div class="hint"><i class="fa-solid fa-hand-pointer"></i> La sรญlaba con <span style="color:var(--accent);text-decoration:underline">color y raya</span> lleva la fuerza. Toca dรณnde corresponde.</div><div class="classify-word"><div class="classify-word-text pop-in">${rendered}</div></div><div class="classify-bins">${data.categories.map(c=>`<div class="classify-bin bin-${c.id}" data-cat="${c.id}"><div style="font-size:1.1rem">${c.label}</div><div style="font-size:.7rem;color:var(--muted);margin-top:4px;font-weight:600">${c.desc}</div></div>`).join('')}</div>`;
        area.querySelectorAll('.classify-bin').forEach(bin=>{bin.addEventListener('click',function(){const chosen=this.dataset.cat;area.querySelectorAll('.classify-bin').forEach(b=>b.style.pointerEvents='none');if(chosen===w.type){playSound('correct');this.classList.add('bin-correct');correct++;const r=this.getBoundingClientRect();miniConfetti(r.left+r.width/2,r.top)}else{playSound('wrong');this.classList.add('bin-wrong');area.querySelector(`.bin-${w.type}`).classList.add('bin-correct')}setTimeout(()=>{current++;updateProgress(current,total);if(current<total)showW();else{const s=correct===total?3:correct>=total-1?2:1;completeActivity(s)}},1000)})});
    }
    showW();
}

/* --- ORDER --- */
function initOrder(act){
    const area=document.getElementById('activity-area'),chains=act.data.chains;
    let cc=0,totalCorrect=0;const totalC=chains.length;
    function showChain(){
        const ch=chains[cc],slots=ch.correct;let placed=[];
        function renderCS(){
            area.innerHTML=`<div class="hint"><i class="fa-solid fa-hand-pointer"></i> ${ch.label}: Toca los organismos en orden, desde el productor hasta el รบltimo consumidor.</div><div class="chain-slots">${slots.map((_,i)=>`<div class="chain-slot ${placed[i]?'filled':''} ${placed[i]?(placed[i]===slots[i]?'correct-slot':'wrong-slot'):''}" id="slot-${i}">${placed[i]||'...'}</div>${i<slots.length-1?'<span class="chain-arrow"><i class="fa-solid fa-arrow-right"></i></span>':''}`).join('')}</div><div class="chain-cards" id="chain-cards">${ch.options.map(o=>`<div class="chain-card ${placed.includes(o)?'used':''}" data-val="${o}">${o}</div>`).join('')}</div>`;
            if(placed.length===slots.length){const ok=placed.every((p,i)=>p===slots[i]);if(ok){totalCorrect++;playSound('correct');area.querySelectorAll('.chain-slot').forEach(s=>{s.classList.remove('wrong-slot');s.classList.add('correct-slot')})}else playSound('wrong');setTimeout(()=>{cc++;updateProgress(cc,totalC);if(cc<totalC)showChain();else{const s=totalCorrect===totalC?3:totalCorrect>=2?2:1;completeActivity(s)}},1200);return}
            area.querySelectorAll('.chain-card:not(.used)').forEach(c=>{c.addEventListener('click',function(){placed.push(this.dataset.val);renderCS()})});
        }
        renderCS();
    }
    showChain();
}

/* ===================== EVENTOS ===================== */
document.getElementById('app').addEventListener('click',function(e){
    const el=e.target.closest('[data-action]');if(!el)return;
    const a=el.dataset.action;playSound('click');
    switch(a){
        case 'openLevel':state.screen='level';state.currentLevel=parseInt(el.dataset.level);render();break;
        case 'goMenu':state.screen='menu';render();break;
        case 'goLevel':state.screen='level';render();break;
        case 'openActivity':state.screen='activity';state.currentActivity=parseInt(el.dataset.act);render();break;
        case 'nextLevel':state.currentLevel++;state.screen='level';render();break;
    }
});

/* ===================== INICIO ===================== */
loadProgress();
render();
</script>
